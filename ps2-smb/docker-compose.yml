services:
  ps2-smb:
    container_name: ps2-smb
    image: fortu/ps2smb
    restart: unless-stopped
    ports:
      - 446:445/tcp
    volumes:
      - ./config:/etc/samba:ro
      - games:/games:rw

volumes:
  games:
    name: ps2_smb_games
    driver: local
    driver_opts:
      type: cifs
      device: //${SMB_HOST}/${SMB_SHARE}
      o: username=${SMB_USERNAME},password=${SMB_PASSWORD},vers=3.0,rw,noatime

networks:
  default:
    name: ps2_smb_network