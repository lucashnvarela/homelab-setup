services:
  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    ports:
      - 7359:7359/udp
    volumes:
      - /docker/jellyfin/config:/config:rw
      - jellyfin_cache:/cache:rw
      - media:/media:rw
    environment:
      JELLYFIN_PublishedServerUrl: https://jellyfin.${DOMAIN}

  gluetun:
    container_name: gluetun
    image: qmcgaw/gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /docker/gluetun:/gluetun:rw
      - ./config:/gluetun/auth:ro
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      UPDATER_PERIOD: 24h
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER}
      VPN_TYPE: ${VPN_TYPE}
      VPN_PORT_FORWARDING: on
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      OPENVPN_USER: ${OPENVPN_USER}
      OPENVPN_PASSWORD: ${OPENVPN_PASSWORD}
      DNS_UPSTREAM_RESOLVERS: cloudflare,google,opendns

include:
  - arr-compose.yml
  - torrent-compose.yml

volumes:
  jellyfin_cache:
  downloads:
  media:
    name: servarr_smb_media
    driver: local
    driver_opts:
      type: cifs
      device: //${SMB_HOST}/${SMB_SHARE}
      o: username=${SMB_USERNAME},password=${SMB_PASSWORD},vers=3.0,rw,noatime,uid=${PUID},gid=${PGID}

networks:
  default:
    name: gateway_network
    external: true